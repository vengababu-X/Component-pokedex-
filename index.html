            </div>

    <script>
        const v = document.getElementById('v');
        const cap = document.getElementById('cap');
        const uiHome = document.getElementById('ui-home');
        const uiReport = document.getElementById('ui-report');
        const loader = document.getElementById('loader');
        const reportText = document.getElementById('report-text');

        const apiKey = ""; // System-managed: No input required
        let currentTarget = "";
        let audioContext;

        window.onload = () => {
            startSystem();
        };

        async function startSystem() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: 'environment', width: { ideal: 1920 }, height: { ideal: 1080 } }
                });
                v.srcObject = stream;
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
            } catch (err) { alert("SENSORS: Optical link failed."); }
        }

        async function runUltimateScan() {
            loader.classList.remove('hidden');
            
            // Capture Frame
            cap.width = v.videoWidth; cap.height = v.videoHeight;
            cap.getContext('2d').drawImage(v, 0, 0);
            const b64 = cap.toDataURL('image/png').split(',')[1];

            // 1. VISION REASONING
            const visionUrl = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`;
            const prompt = `Inspect this object in detail. 
            Identify if it is an electronic component (ICs, MCUs, etc.), a living world element (plants, animals), or a household item (TVs, tools).
            Provide:
            1. IDENTITY: Exact name.
            2. FUNCTION: Detailed explanation of how it works.
            3. USAGE: Step-by-step guide on how a human uses it.
            4. TECHNICAL SPECS: Visible details or pins.
            Tone: Professional, high-tech engineering report.`;

            try {
                const response = await fetch(visionUrl, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts: [{ text: prompt }, { inlineData: { mimeType: "image/png", data: b64 } }] }] })
                });
                const data = await response.json();
                if (data.error) throw new Error(data.error.message);

                const result = data.candidates[0].content.parts[0].text;
                currentTarget = result.split('\n')[0].replace('IDENTITY:', '').trim();

                // 2. VOICE SYNTHESIS (TTS)
                await speakResult(result.split('\n')[0] + ". " + result.split('\n')[1]);

                // 3. UI DISPLAY
                reportText.innerHTML = result
                    .replace(/\n/g, '<br>')
                    .replace(/\*\*(.*?)\*\*/g, '<b class="text-cyan-400">$1</b>');

                uiHome.classList.add('hidden');
                uiReport.classList.remove('hidden');
            } catch (err) {
                alert("NEURAL_FAULT: " + err.message);
            } finally { loader.classList.add('hidden'); }
        }

        async function speakResult(text) {
            const ttsUrl = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-tts:generateContent?key=${apiKey}`;
            const payload = {
                contents: [{ parts: [{ text: `Ship computer voice: ${text}` }] }],
                generationConfig: {
                    responseModalities: ["AUDIO"],
                    speechConfig: { voiceConfig: { prebuiltVoiceConfig: { voiceName: "Kore" } } }
                }
            };

            try {
                const response = await fetch(ttsUrl, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                const data = await response.json();
                const pcmBase64 = data.candidates[0].content.parts[0].inlineData.data;
                
                // Audio Decoding Logic
                const binary = atob(pcmBase64);
                const bytes = new Uint8Array(binary.length);
                for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
                
                const pcm16 = new Int16Array(bytes.buffer);
                const float32 = new Float32Array(pcm16.length);
                for (let i = 0; i < pcm16.length; i++) float32[i] = pcm16[i] / 32768.0;

                const buffer = audioContext.createBuffer(1, float32.length, 24000);
                buffer.copyToChannel(float32, 0);
                const source = audioContext.createBufferSource();
                source.buffer = buffer;
                source.connect(audioContext.destination);
                source.start();
            } catch (e) { console.error("AUDIO_FAULT:", e); }
        }

        function resetApp() {
            uiReport.classList.add('hidden');
            uiHome.classList.remove('hidden');
            reportText.innerHTML = "";
        }

        function copyToLog() {
            const temp = document.createElement('textarea');
            temp.value = reportText.innerText;
            document.body.appendChild(temp);
            temp.select();
            document.execCommand('copy');
            document.body.removeChild(temp);
            alert("LOG: Analysis copied to clipboard.");
        }

        function openDatasheet() {
            window.open(`https://www.google.com/search?q=${encodeURIComponent(currentTarget + " technical details datasheet pdf")}`, '_blank');
        }
    </script>
